    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 {\n  /* PRIMARIOS */\n  --emma-navy:      #171C8F;\n  --emma-green:     #26D07C;\n\n  /* SECUNDARIOS */\n  --emma-red:       #F4364C;\n  --emma-cyan:      #05C3DD;\n  --emma-yellow:    #F6BE00;\n  --emma-purple:    #753BBD;\n\n  /* NEUTRALES */\n  --emma-black:     #1A1B1E;\n  --emma-gray:      #7C878E;\n  --emma-gray-500:  #8A8AA0;\n  --emma-gray-300:  #D1D1E0;\n  --emma-gray-200:  #E8E8F4;\n  --emma-gray-100:  #F5F5F5;\n  --emma-bg-blue:   #F7F8FF;\n  --emma-bg-gray:   #FAFAFA;\n  --emma-white:     #FFFFFF;\n\n  /* SEM\u00c1NTICOS */\n  --color-success:  #4CAF50;\n  --color-error:    #F44336;\n  --color-warning:  #FF9800;\n  --color-info:     #2196F3;\n\n  /* DISABLED (botones) */\n  --btn-primary-disabled-bg: #E4E4EF;\n  --btn-primary-disabled-text: #7477BC;\n\n  /* TIPOGRAF\u00cdA */\n  --font-brand: 'Roboto', sans-serif;\n  --fw-regular: 400;\n  --fw-medium: 500;\n  --fw-semibold: 600;\n  --fw-bold: 700;\n\n  /* ESPACIADO */\n  --space-1: 4px;   --space-2: 8px;   --space-3: 12px;\n  --space-4: 16px;  --space-5: 20px;  --space-6: 24px;\n  --space-8: 32px;  --space-10: 40px; --space-12: 48px;\n\n  /* RADIOS */\n  --radius-btn:  4px;\n  --radius-sm:   8px;\n  --radius-md:   12px;\n  --radius-lg:   16px;\n  --radius-xl:   24px;\n  --radius-2xl:  32px;\n  --radius-full: 9999px;\n\n  /* SOMBRAS */\n  --shadow-sm:   0 1px 4px rgba(23,28,143,0.08);\n  --shadow-md:   0 4px 16px rgba(23,28,143,0.12);\n  --shadow-lg:   0 8px 32px rgba(23,28,143,0.16);\n  --shadow-card: 0 2px 12px rgba(23,28,143,0.10);\n\n  /* SIDEBAR DIMENSIONS */\n  --sidebar-closed: 120px;\n  --sidebar-open: 240px;\n}\n\n/* ============================================\n   RESET & BASE\n   ============================================ */\n* {\n  box-sizing: border-box;\n  margin: 0;\n  padding: 0;\n}\n\nhtml, body {\n  font-family: var(--font-brand);\n  font-size: 14px;\n  color: var(--emma-black);\n  background: var(--emma-white);\n  line-height: 1.4;\n  -webkit-font-smoothing: antialiased;\n}\n\nbutton {\n  font-family: inherit;\n  cursor: pointer;\n  border: none;\n  background: none;\n}\n\na {\n  color: inherit;\n  text-decoration: none;\n}\n\n/* ============================================\n   APP LAYOUT\n   ============================================ */\n.app {\n  display: flex;\n  min-height: 100vh;\n  background: var(--emma-white);\n}\n\n/* ============================================\n   SIDEBAR\n   ============================================ */\n.sidebar {\n  width: var(--sidebar-closed);\n  background: var(--emma-white);\n  border-right: 1px solid var(--emma-gray-200);\n  display: flex;\n  flex-direction: column;\n  padding: var(--space-6) 0;\n  transition: width 0.2s ease;\n  position: relative;\n}\n\n.sidebar.open { width: var(--sidebar-open); }\n\n.sidebar-header {\n  display: flex;\n  align-items: center;\n  gap: var(--space-3);\n  padding: 0 var(--space-6);\n  margin-bottom: var(--space-10);\n}\n\n.sidebar-toggle {\n  width: 24px;\n  height: 24px;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  color: var(--emma-black);\n  flex-shrink: 0;\n}\n\n.sidebar-logo-closed {\n  width: 40px;\n  height: 40px;\n  flex-shrink: 0;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n}\n\n.sidebar-logo-closed svg { width: 100%; height: 100%; display: block; }\n\n.sidebar-logo-open {\n  display: none;\n  font-weight: var(--fw-bold);\n  font-size: 18px;\n  color: var(--emma-navy);\n  letter-spacing: 0.5px;\n}\n\n.sidebar-logo-open .logo-uni {\n  text-decoration: underline;\n  text-underline-offset: 4px;\n}\n\n.sidebar.open .sidebar-logo-closed { display: none; }\n.sidebar.open .sidebar-logo-open { display: block; }\n\n.sidebar-nav {\n  flex: 1;\n  display: flex;\n  flex-direction: column;\n  gap: var(--space-2);\n  padding: 0 var(--space-4);\n}\n\n.nav-item {\n  display: flex;\n  align-items: center;\n  gap: var(--space-4);\n  padding: var(--space-3) var(--space-4);\n  border-radius: var(--radius-sm);\n  color: var(--emma-black);\n  font-size: 14px;\n  font-weight: var(--fw-medium);\n  cursor: pointer;\n  transition: background 0.15s ease;\n  white-space: nowrap;\n  overflow: hidden;\n}\n\n.nav-item:hover { background: var(--emma-gray-100); }\n\n.nav-item.active {\n  background: var(--emma-bg-blue);\n  color: var(--emma-navy);\n}\n\n.nav-item-icon {\n  width: 24px;\n  height: 24px;\n  flex-shrink: 0;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n}\n\n.nav-item-label { display: none; }\n.sidebar.open .nav-item-label { display: block; }\n\n.sidebar-footer {\n  padding: 0 var(--space-4);\n  margin-top: auto;\n}\n\n/* ============================================\n   MAIN CONTENT\n   ============================================ */\n.main {\n  flex: 1;\n  display: flex;\n  flex-direction: column;\n  background: var(--emma-white);\n}\n\n/* ============================================\n   TOP BAR\n   ============================================ */\n.topbar {\n  display: flex;\n  align-items: center;\n  justify-content: flex-end;\n  padding: var(--space-5) var(--space-8);\n}\n\n.flag-jamaica {\n  width: 32px;\n  height: 32px;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  flex-shrink: 0;\n}\n\n.flag-jamaica svg { width: 100%; height: 100%; display: block; }\n\n/* ============================================\n   CONTENT AREA\n   ============================================ */\n.content {\n  flex: 1;\n  padding: var(--space-4) var(--space-10) var(--space-10);\n  width: 100%;\n}\n\n.content-inner {\n  max-width: 720px;\n  margin: 0 auto;\n  width: 100%;\n}\n\n.page-title {\n  font-size:24px;\n  font-weight: var(--fw-medium);\n  color: var(--emma-navy);\n  letter-spacing: 0.02em;\n  margin-bottom: var(--space-2);\n  padding: 0 var(--space-2);\n}\n\n.page-subtitle {\n  font-size: 16px;\n  color: var(--emma-gray-500);\n  margin-bottom: var(--space-8);\n  padding: 0 var(--space-2);\n}\n\n/* ============================================\n   SEARCH CARD\n   ============================================ */\n.search-card {\n  background: var(--emma-white);\n  border: 1px solid var(--emma-gray-200);\n  border-radius: var(--radius-md);\n  box-shadow: var(--shadow-card);\n  padding: var(--space-6) var(--space-8) var(--space-8);\n  margin-bottom: var(--space-8);\n}\n\n/* Card top bar: \"+ New customer\" alineado a la derecha */\n.card-topbar {\n  display: flex;\n  align-items: center;\n  justify-content: flex-end;\n  margin-bottom: var(--space-4);\n}\n\n.new-customer-link {\n  display: inline-flex;\n  align-items: center;\n  gap: var(--space-2);\n  color: var(--emma-navy);\n  font-size: 14px;\n  font-weight: var(--fw-bold);\n  letter-spacing: 0.02em;\n  padding: var(--space-2) var(--space-2);\n  cursor: pointer;\n  transition: opacity 0.15s ease;\n}\n\n.new-customer-link:hover { opacity: 0.7; }\n\n.new-customer-link svg {\n  width: 18px;\n  height: 18px;\n}\n\n/* ============================================\n   TABS (Document / Name / COSACS ID)\n   ============================================ */\n.tabs {\n  display: flex;\n  border-bottom: 1px solid var(--emma-gray-200);\n  margin: 0 calc(-1 * var(--space-8)) var(--space-6);\n  padding: 0 var(--space-8);\n}\n\n.tab {\n  flex: 1;\n  display: inline-flex;\n  align-items: center;\n  justify-content: center;\n  gap: var(--space-2);\n  padding: var(--space-3) 0 var(--space-4);\n  font-size: 14px;\n  font-weight: var(--fw-medium);\n  color: var(--emma-gray-500);\n  letter-spacing: 0.02em;\n  cursor: pointer;\n  border-bottom: 2px solid transparent;\n  margin-bottom: -1px;\n  transition: color 0.15s ease, border-color 0.15s ease;\n  white-space: nowrap;\n}\n\n.tab svg {\n  width: 18px;\n  height: 18px;\n}\n\n.tab:hover:not(.disabled):not(.active) {\n  color: var(--emma-black);\n}\n\n.tab.active {\n  color: var(--emma-navy);\n  border-bottom-color: var(--emma-navy);\n  font-weight: var(--fw-bold);\n}\n\n.tab.disabled {\n  color: var(--emma-gray-300);\n  cursor: not-allowed;\n}\n\n/* COSACS action: align Search button with the input field (ignoring hint) */\n.cosacs-action {\n  display: flex;\n  align-items: flex-start;\n}\n\n.cosacs-action .btn-search {\n  width: 100%;\n  height: 48px;\n  min-width: 0;\n}\n\n/* ============================================\n   TAB PANELS\n   ============================================ */\n.tab-panel { display: none; }\n.tab-panel.active { display: block; }\n\n/* Native date input styled to match outlined fields */\n.input-date {\n  font-weight: var(--fw-bold);\n  color: var(--emma-black);\n  cursor: pointer;\n}\n.input-date::-webkit-calendar-picker-indicator {\n  cursor: pointer;\n  opacity: 0.55;\n}\n.input-date:not(:focus):invalid,\n.input-date[value=\"\"] {\n  color: var(--emma-gray-500);\n}\n\n/* ============================================\n   FORM ROW\n   ============================================ */\n.search-form {\n  display: flex;\n  flex-direction: column;\n  gap: var(--space-5);\n}\n\n.form-row {\n  display: grid;\n  gap: var(--space-4);\n  align-items: start;\n  grid-template-columns: 1fr 1fr;\n}\n\n.form-actions {\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: var(--space-4);\n  margin-top: var(--space-1);\n}\n\n.form-actions .btn-search {\n  grid-column: 2;\n  width: 100%;\n  min-width: 0;\n}\n\n/* ============================================\n   INPUTS (Material Outlined style)\n   ============================================ */\n.input-group { position: relative; }\n\n.input-field {\n  width: 100%;\n  height: 48px;\n  padding: 0 var(--space-4);\n  border: 1.5px solid var(--emma-gray-300);\n  border-radius: var(--radius-btn);\n  background: var(--emma-white);\n  font-family: var(--font-brand);\n  font-size: 14px;\n  font-weight: var(--fw-bold);\n  color: var(--emma-black);\n  transition: border-color 0.15s ease;\n}\n\n.input-field:focus {\n  outline: none;\n  border-color: var(--emma-navy);\n  border-width: 2px;\n}\n\n.input-field::placeholder {\n  color: var(--emma-gray-500);\n  font-weight: var(--fw-regular);\n  letter-spacing: 0.04em;\n}\n\n.input-label {\n  position: absolute;\n  top: -8px;\n  left: 12px;\n  background: var(--emma-white);\n  padding: 0 var(--space-1);\n  font-size: 11px;\n  font-weight: var(--fw-regular);\n  color: var(--emma-gray-500);\n  letter-spacing: 0.04em;\n}\n\n.input-field:focus ~ .input-label,\n.input-group.focused .input-label {\n  color: var(--emma-navy);\n}\n\n.input-hint {\n  font-size: 11px;\n  color: var(--emma-gray-500);\n  margin-top: var(--space-1);\n  padding-left: var(--space-3);\n  letter-spacing: 0.02em;\n}\n\n/* Select wrapper */\n.select-wrapper { position: relative; }\n\n.select-wrapper::after {\n  content: '';\n  position: absolute;\n  right: 16px;\n  top: 50%;\n  width: 8px;\n  height: 8px;\n  border-right: 2px solid var(--emma-gray-500);\n  border-bottom: 2px solid var(--emma-gray-500);\n  transform: translateY(-75%) rotate(45deg);\n  pointer-events: none;\n}\n\n.select-field {\n  appearance: none;\n  width: 100%;\n  height: 48px;\n  padding: 0 var(--space-10) 0 var(--space-4);\n  border: 1.5px solid var(--emma-gray-300);\n  border-radius: var(--radius-btn);\n  background: var(--emma-white);\n  font-family: var(--font-brand);\n  font-size: 14px;\n  font-weight: var(--fw-bold);\n  color: var(--emma-black);\n  cursor: pointer;\n}\n\n.select-field:focus {\n  outline: none;\n  border-color: var(--emma-navy);\n  border-width: 2px;\n}\n\n/* ============================================\n   BUTTONS\n   ============================================ */\n.btn {\n  height: 48px;\n  border-radius: var(--radius-btn);\n  font-size: 14px;\n  font-weight: var(--fw-bold);\n  letter-spacing: 0.05em;\n  padding: 0 var(--space-6);\n  display: inline-flex;\n  align-items: center;\n  justify-content: center;\n  gap: var(--space-2);\n  transition: opacity 0.15s ease, background 0.15s ease;\n  cursor: pointer;\n}\n\n.btn-primary {\n  background: var(--emma-green);\n  color: var(--emma-navy);\n}\n\n.btn-primary:hover { opacity: 0.9; }\n\n.btn-primary:disabled,\n.btn-primary.disabled {\n  background: var(--btn-primary-disabled-bg);\n  color: var(--btn-primary-disabled-text);\n  cursor: not-allowed;\n}\n\n/* ============================================\n   CARD FOOTER \u00b7 Pointer to \"+ New customer\"\n   ============================================ */\n.card-footer-row {\n  display: flex;\n  justify-content: flex-start;\n  margin-top: var(--space-5);\n  padding-top: var(--space-4);\n  border-top: 1px solid var(--emma-gray-200);\n}\n\n.card-footer-text {\n  font-size: 13px;\n  color: var(--emma-gray-500);\n  letter-spacing: 0.02em;\n}\n\n.card-footer-link {\n  font-size: 13px;\n  font-weight: var(--fw-medium);\n  color: var(--emma-navy);\n  cursor: pointer;\n  letter-spacing: 0.02em;\n}\n\n.card-footer-link:hover { text-decoration: underline; }\n\n/* ============================================\n   RECENT SEARCHES\n   ============================================ */\n.recent-section { width: 100%; }\n\n.recent-header {\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  margin-bottom: var(--space-4);\n  padding: 0 var(--space-2);\n}\n\n.recent-title {\n  font-size: 16px;\n  font-weight: var(--fw-bold);\n  color: var(--emma-black);\n  letter-spacing: 0.03em;\n}\n\n.recent-count {\n  font-size: 12px;\n  color: var(--emma-gray-500);\n}\n\n/* Empty state */\n.recent-empty {\n  background: var(--emma-bg-gray);\n  border: 1px dashed var(--emma-gray-300);\n  border-radius: var(--radius-md);\n  padding: var(--space-10) var(--space-6);\n  display: flex;\n  flex-direction: column;\n  align-items: center;\n  gap: var(--space-3);\n  text-align: center;\n}\n\n.recent-empty-icon {\n  width: 48px;\n  height: 48px;\n  border-radius: 50%;\n  background: var(--emma-gray-200);\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  color: var(--emma-gray-500);\n}\n\n.recent-empty-text {\n  font-size: 14px;\n  color: var(--emma-gray-500);\n  max-width: 320px;\n}\n\n.recent-empty-text strong {\n  display: block;\n  color: var(--emma-black);\n  font-weight: var(--fw-bold);\n  margin-bottom: var(--space-1);\n  font-size: 14px;\n}\n\n/* Recent list (with data) */\n.recent-list {\n  background: var(--emma-white);\n  border: 1px solid var(--emma-gray-200);\n  border-radius: var(--radius-md);\n  overflow: hidden;\n}\n\n.recent-item {\n  display: flex;\n  align-items: center;\n  gap: var(--space-4);\n  padding: var(--space-4) var(--space-5);\n  border-bottom: 1px solid var(--emma-gray-200);\n  cursor: pointer;\n  transition: background 0.15s ease;\n}\n\n.recent-item:last-child { border-bottom: none; }\n\n.recent-item:hover { background: var(--emma-bg-blue); }\n\n.recent-info { flex: 1; min-width: 0; }\n\n.recent-name {\n  font-size: 14px;\n  font-weight: var(--fw-bold);\n  color: var(--emma-black);\n  letter-spacing: 0.02em;\n  margin-bottom: 2px;\n  white-space: nowrap;\n  overflow: hidden;\n  text-overflow: ellipsis;\n}\n\n.recent-meta {\n  font-size: 12px;\n  color: var(--emma-gray-500);\n  letter-spacing: 0.03em;\n}\n\n.recent-chip {\n  padding: 4px 12px;\n  border-radius: var(--radius-btn);\n  font-size: 12px;\n  font-weight: var(--fw-medium);\n  letter-spacing: 0.03em;\n  white-space: nowrap;\n  flex-shrink: 0;\n}\n\n.chip-approved {\n  background: rgba(76, 175, 80, 0.12);\n  color: #2E7D32;\n}\n\n.chip-analysis {\n  background: rgba(255, 152, 0, 0.12);\n  color: #E65100;\n}\n\n.chip-rejected {\n  background: rgba(244, 67, 54, 0.12);\n  color: #C62828;\n}\n\n.chip-observations {\n  background: rgba(246, 190, 0, 0.18);\n  color: #8B6914;\n}\n\n.recent-chevron {\n  color: var(--emma-gray-500);\n  display: flex;\n  align-items: center;\n  flex-shrink: 0;\n}\n\n/* ============================================\n   FOOTER\n   ============================================ */\n.footer {\n  background: var(--emma-gray-100);\n  padding: var(--space-5);\n  text-align: center;\n  font-size: 12px;\n  color: var(--emma-gray-500);\n  margin-top: var(--space-10);\n}\n\n/* ============================================\n   RESULTS SCREEN\n   ============================================ */\n/* Wider inner column so the 7-column table reads comfortably */\n.content-inner.results-inner { max-width: 960px; }\n\n/* Refine-results bar (always visible, between summary and table) */\n.refine-bar {\n  background: var(--emma-white);\n  border: 1px solid var(--emma-gray-200);\n  border-radius: var(--radius-md);\n  box-shadow: none;\n  padding: var(--space-4);\n  margin-bottom: var(--space-5);\n}\n\n.refine-fields {\n  display: flex;\n  flex-wrap: wrap;\n  align-items: flex-end;\n  gap: var(--space-3);\n}\n.refine-bar .input-group { flex: 1; min-width: 150px; }\n.refine-bar .input-group--spacer { display: none; }\n.refine-bar .input-field { height: 40px; font-size: 13px; }\n.refine-actions { align-items: flex-end; }\n.refine-actions .btn { height: 40px; font-size: 13px; padding: 0 18px; letter-spacing: 0.03em; }\n\n.refine-fields .input-group {\n  min-width: 0;\n}\n\n.refine-actions {\n  display: flex;\n  align-items: flex-start;\n}\n\n.refine-actions .btn {\n  width: 100%;\n  height: 48px;\n  white-space: nowrap;\n}\n\n@media (max-width: 640px) {\n  .refine-fields { grid-template-columns: 1fr; }\n}\n\n/* Back to search link */\n.back-link {\n  display: inline-flex;\n  align-items: center;\n  gap: var(--space-2);\n  color: var(--emma-navy);\n  font-size: 13px;\n  font-weight: var(--fw-medium);\n  letter-spacing: 0.03em;\n  padding: var(--space-2) var(--space-2);\n  margin-bottom: var(--space-2);\n  cursor: pointer;\n  transition: opacity 0.15s ease;\n}\n\n.back-link:hover { opacity: 0.7; }\n\n.back-link svg { width: 18px; height: 18px; }\n\n/* Search summary card */\n.summary-card {\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  gap: var(--space-4);\n  background: transparent;\n  border: 0;\n  border-radius: 0;\n  padding: var(--space-2) 0;\n  margin-bottom: var(--space nsparent; border:1.5px solid var(--navy);\n  color:var(--navy); border-radius:9999px; padding:9px 18px; font-size:13px; font-weight:700; cursor:pointer; font-family:inherit;\n  transition:background .15s; white-space:nowrap; }\n.carts-view .cart-c-btn:hover{ background:#EEF0FF; }\n.carts-view .cart-c-btn svg{ width:15px; height:15px; }\n\n/* cart detail modal */\n.cart-modal{ position:fixed; inset:0; z-index:9998; display:none; align-items:center; justify-content:center; padding:20px;\n  font-family:'Roboto',sans-serif; }\n.cart-modal.open{ display:flex; }\n.cart-modal-bg{ position:absolute; inset:0; background:rgba(13,16,80,.5); }\n.cart-modal-card{ position:relative; z-index:1; width:100%; max-width:520px; max-height:88vh; overflow:auto; background:#fff;\n  border-radius:20px; box-shadow:0 24px 70px rgba(13,16,80,.4); }\n.cart-modal .cm-head{ display:flex; align-items:flex-start; justify-content:space-between; gap:12px; padding:22px 24px 12px;\n  position:sticky; top:0; background:#fff; z-index:2; }\n.cart-modal .cm-acct{ font-size:17px; font-weight:700; color:var(--ink); }\n.cart-modal .cm-count{ font-size:12.5px; color:var(--muted); margin-top:2px; }\n.cart-modal .cm-x{ background:#F1EFF8; border:0; width:34px; height:34px; border-radius:50%; cursor:pointer; font-size:18px;\n  color:var(--muted); line-height:1; flex:none; }\n.cart-modal .cm-x:hover{ background:#E8E8F4; }\n.cart-modal .cm-body{ padding:0 24px 8px; }\n.cart-modal .cm-section-label{ font-size:11px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--muted);\n  margin:18px 0 6px; }\n.cart-modal .cm-row{ display:flex; align-items:center; justify-content:space-between; gap:12px; font-size:13.5px; padding:7px 0; }\n.cart-modal .cm-row span:first-child{ color:var(--muted); }\n.cart-modal .cm-row span:last-child{ font-weight:600; color:var(--ink); font-variant-numeric:tabular-nums; }\n.cart-modal .cm-row.strong span:last-child{ color:var(--navy); font-weight:700; }\n.cart-modal .cm-row.big span:last-child{ font-size:19px; font-weight:800; color:var(--navy); }\n.cart-modal .cm-divider{ height:1px; background:var(--line); margin:8px 0; }\n.cart-modal .cm-foot{ display:flex; align-items:center; justify-content:space-between; gap:12px; padding:16px 24px 22px;\n  position:sticky; bottom:0; background:#fff; border-top:1px solid var(--line); flex-wrap:wrap; }\n.cart-modal .cm-cta{ display:inline-flex; align-items:center; gap:7px; background:var(--green); color:var(--navy); border:0;\n  border-radius:9999px; padding:12px 20px; font-size:14px; font-weight:700; cursor:pointer; font-family:inherit; transition:background .15s; }\n.cart-modal .cm-cta:hover{ background:var(--green-d); }\n.cart-modal .cart-fit{ display:none; align-items:center; font-size:11.5px; font-weight:700; padding:6px 12px; border-radius:9999px; }\n.cart-modal .cart-fit.ok{ background:rgba(38,208,124,.14); color:#15A35B; }\n.cart-modal .cart-fit.tol{ background:rgba(246,190,0,.18); color:#946F00; }\n.cart-modal .cart-fit.over{ background:rgba(244,54,76,.12); color:#D32F45; }\n\n\n/* carts head row + new cart */\n.carts-view .carts-head-row{ display:flex; align-items:center; justify-content:space-between; gap:12px; margin:22px 0 12px; flex-wrap:wrap; }\n.carts-view .carts-new-btn{ display:inline-flex; align-items:center; gap:7px; background:transparent; border:1.5px solid var(--navy);\n  color:var(--navy); border-radius:9999px; padding:8px 16px; font-size:13px; font-weight:700; cursor:pointer; font-family:inherit; transition:background .15s; }\n.carts-view .carts-new-btn:hover{ background:#EEF0FF; }\n\n/* card head right: fit badge + delete */\n.carts-view .cart-c-head-right{ display:flex; align-items:center; gap:8px; flex:none; }\n.carts-view .cart-del{ width:32px; height:32px; flex:none; display:inline-flex; align-items:center; justify-content:center;\n  background:transparent; border:1px solid var(--line); border-radius:9px; color:var(--muted); cursor:pointer; transition:all .15s; }\n.carts-view .cart-del:hover{ background:rgba(244,54,76,.08); border-color:rgba(244,54,76,.4); color:#D32F45; }\n\n/* card foot buttons: See cart (secondary) + Simulate financing (primary) */\n.carts-view .cart-c-see{ background:transparent; border:0; color:var(--navy); font-family:inherit; font-size:13px; font-weight:700;\n  padding:9px 14px; border-radius:9999px; cursor:pointer; transition:background .15s; }\n.carts-view .cart-c-see:hover{ background:#EEF0FF; }\n.carts-view .cart-c-sim{ display:inline-flex; align-items:center; gap:7px; background:var(--green); color:var(--navy); border:0;\n  border-radius:9999px; padding:10px 18px; font-size:13.5px; font-weight:700; cursor:pointer; font-family:inherit; transition:background .15s; }\n.carts-view .cart-c-sim:hover{ background:var(--green-d); }\n.carts-view .cart-c-sim svg{ width:16px; height:16px; }\n\n/* delete confirmation modal */\n.confirm-modal .confirm-card{ max-width:400px; padding:26px 24px 22px; text-align:center; }\n.confirm-card .confirm-icon{ width:54px; height:54px; margin:0 auto 14px; border-radius:50%; display:flex; align-items:center;\n  justify-content:center; background:rgba(244,54,76,.1); color:#E24B4A; }\n.confirm-card .confirm-title{ font-size:18px; font-weight:700; color:var(--ink); margin:0 0 8px; }\n.confirm-card .confirm-text{ font-size:13.5px; color:var(--muted); line-height:1.5; margin:0 0 20px; }\n.confirm-card .confirm-actions{ display:flex; gap:10px; }\n.confirm-card .confirm-cancel{ flex:1; height:46px; border:1.5px solid var(--border-default,#D1D1E0); background:#fff; color:var(--ink);\n  border-radius:9999px; font-size:14px; font-weight:700; cursor:pointer; font-family:inherit; }\n.confirm-card .confirm-cancel:hover{ background:var(--bg); }\n.confirm-card .confirm-delete{ flex:1; height:46px; border:0; background:#F4364C; color:#fff; border-radius:9999px;\n  font-size:14px; font-weight:700; cursor:pointer; font-family:inherit; transition:background .15s; }\n.confirm-card .confirm- pan><span id=\"cm-delivery\"></span></div>\n        <div class=\"cm-row\"><span>Extended warranty</span><span id=\"cm-warranty\"></span></div>\n        <div class=\"cm-divider\"></div>\n        <div class=\"cm-row strong\"><span>Cart total</span><span id=\"cm-total\"></span></div>\n        <div class=\"cm-row\"><span>Down payment</span><span id=\"cm-deposit\"></span></div>\n        <div class=\"cm-row big\"><span>Amount to finance</span><span id=\"cm-financed\"></span></div>\n      </div>\n      <footer class=\"cm-foot\">\n        <span class=\"cart-fit\" id=\"cm-fit\"></span>\n        <button class=\"cm-cta\" onclick=\"simulateCartFromModal()\">Simulate financing\n          <svg viewBox=\"0 0 24 24\" width=\"17\" height=\"17\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"5\" y1=\"12\" x2=\"19\" y2=\"12\"></line><polyline points=\"12 5 19 12 12 19\"></polyline></svg>\n        </button>\n      </footer>\n    </div>\n  </div>\n\n  <div class=\"cart-modal confirm-modal\" id=\"cart-confirm\" aria-hidden=\"true\">\n    <div class=\"cart-modal-bg\" onclick=\"closeConfirm()\"></div>\n    <div class=\"cart-modal-card confirm-card\" role=\"alertdialog\" aria-modal=\"true\">\n      <div class=\"confirm-icon\">\n        <svg viewBox=\"0 0 24 24\" width=\"26\" height=\"26\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z\"></path><line x1=\"12\" y1=\"9\" x2=\"12\" y2=\"13\"></line><line x1=\"12\" y1=\"17\" x2=\"12.01\" y2=\"17\"></line></svg>\n      </div>\n      <h3 class=\"confirm-title\">Delete this cart?</h3>\n      <p class=\"confirm-text\" id=\"confirm-text\"></p>\n      <div class=\"confirm-actions\">\n        <button class=\"confirm-cancel\" onclick=\"closeConfirm()\">Cancel</button>\n        <button class=\"confirm-delete\" onclick=\"doDeleteCart()\">Delete cart</button>\n      </div>\n    </div>\n  </div>\n\n</div>\n      <div class=\"footer\">\u00a9 Unicomer. All rights reserved.</div>\n    </main>\n  </div>\n</div>\n\n\n\n<script>\n/* Document-type \u2192 placeholder + hint + validator mapping\n   validate() receives the raw input value; separators are ignored. */\nconst docFormats = {\n  trn:      { placeholder: '000-000-000', hint: 'Format: 9 digits in blocks of 3',\n              validate: v => /^\\d{9}$/.test(v.replace(/[\\s-]/g, '')) },\n  voters:   { placeholder: 'e.g. 1234567', hint: 'Format: 7 digits, no spaces',\n              validate: v => /^\\d{7}$/.test(v.replace(/[\\s-]/g, '')) },\n  passport: { placeholder: 'A0000000',    hint: 'Format: 1 letter + 7 digits (8 characters)',\n              validate: v => /^[A-Za-z]\\d{7}$/.test(v.replace(/[\\s-]/g, '')) },\n  license:  { placeholder: '0000000-00',  hint: 'Format: 9 digits, blocks of 7 and 2',\n              validate: v => /^\\d{9}$/.test(v.replace(/[\\s-]/g, '')) },\n  nids:     { placeholder: '000000000',   hint: 'Format: 9 digits, no separators',\n              validate: v => /^\\d{9}$/.test(v.replace(/[\\s-]/g, '')) }\n};\n\nfunction onDocTypeChange(idx) {\n  const sel = document.getElementById('doc-type-' + idx);\n  const input = document.getElementById('doc-number-' + idx);\n  const hint = document.getElementById('doc-hint-' + idx);\n  const fmt = docFormats[sel.value] || docFormats.trn;\n  input.value = '';\n  input.placeholder = fmt.placeholder;\n  hint.textContent = fmt.hint;\n  validateDoc(idx);\n}\n\nfunction validateDoc(idx) {\n  const sel = document.getElementById('doc-type-' + idx);\n  const input = document.getElementById('doc-number-' + idx);\n  const btn = document.getElementById('search-btn-' + idx);\n  const fmt = docFormats[sel.value] || docFormats.trn;\n  const valid = fmt.validate(input.value);\n  btn.disabled = !valid;\n  btn.classList.toggle('disabled', !valid);\n}\n\n/* Tab switching */\nfunction switchTab(tabEl) {\n  if (tabEl.classList.contains('disabled')) return;\n  const card = tabEl.closest('.search-card');\n  const target = tabEl.dataset.tab;\n  card.querySelectorAll('.tab').forEach(t => {\n    const on = t === tabEl;\n    t.classList.toggle('active', on);\n    t.setAttribute('aria-selected', on ? 'true' : 'false');\n  });\n  card.querySelectorAll('.tab-panel').forEach(p => {\n    p.classList.toggle('active', p.dataset.panel === target);\n  });\n}\n\n/* Name tab validation */\nfunction isValidDob(v) {\n  if (!v) return false;\n  const d = new Date(v);\n  return !isNaN(d.getTime()) && d <= new Date();\n}\n\nfunction validateName(idx) {\n  const first  = document.getElementById('name-first-'  + idx).value.trim();\n  const last   = document.getElementById('name-last-'   + idx).value.trim();\n  const second = document.getElementById('name-second-' + idx).value.trim();\n  const dob    = document.getElementById('name-dob-'    + idx).value;\n  const btn    = document.getElementById('name-search-btn-' + idx);\n\n  const requiredOk = first.length >= 3 && last.length >= 3;\n  const secondOk   = second.length === 0 || second.length >= 3;\n  const dobOk      = dob === '' || isValidDob(dob);\n\n  const valid = requiredOk && secondOk && dobOk;\n  btn.disabled = !valid;\n  btn.classList.toggle('disabled', !valid);\n}\n\n/* COSACS ID validation: exactly 12 digits */\nfunction validateCosacs(idx) {\n  const input = document.getElementById('cosacs-id-' + idx);\n  const btn   = document.getElementById('cosacs-search-btn-' + idx);\n  const valid = /^[A-Za-z]{4}\\d{6}$/.test(input.value.replace(/\\s/g, ''));\n  btn.disabled = !valid;\n  btn.classList.toggle('disabled', !valid);\n}\n\n/* Cap birth-date pickers to today */\ndocument.querySelectorAll('.input-date').forEach(d => {\n  d.max = new Date().toISOString().split('T')[0];\n});\n\n/* Sidebar toggle */\ndocument.querySelectorAll('.sidebar-toggle').forEach(btn => {\n  btn.addEventListener('click', () => {\n    btn.closest('.sidebar').classList.toggle('open');\n  });\n});\n\n/* The most recent search, so the results / no-result summary cards and the\n   Back-to-search return path can reflect exactly what was queried.\n   Shape: { tab:'name', first, last, second }\n        | { tab:'document', docType, docValue }\n        | { tab:'cosacs', cosacs } */\nlet lastSearch = null;\n\nconst docLabels = { trn: 'TRN', voters: 'Voters ID', passport: 'Passport', license: \"Driver's licence\", nids: 'NIDS' };\n\n/* Populate + show the \"No customer found\" screen.\n   summaryLabel \u2192 shown in the summary card (\"TRN\", \"Customer name\", \"Coscacs ID\")\n   titleLabel   \u2192 interpolated into the dynamic title (\"TRN\", \"name\", \"Coscacs ID\"\u2026) */\nfunction showNoResult(summaryLabel, value, titleLabel) {\n  document.getElementById('noresult-type').textContent  = summaryLabel;\n  document.getElementById('noresult-query').textContent = '\"' + value + '\"';\n  document.getElementById('noresult-title').textContent = 'No customer found with that ' + titleLabel;\n  showScreen('noresult');\n}\n\n/* Run a \"Customer name\" search. idx 1 = empty screen, 2 = data screen.\n   Demo wiring: last name \"Brown\" \u2192 list of matches; anything else \u2192 no result.\n   Guarded so an empty/invalid query is a no-op (the button is disabled too). */\nfunction runNameSearch(idx) {\n  const first  = document.getElementById('name-first-'  + idx).value.trim();\n  const last   = document.getElementById('name-last-'   + idx).value.trim();\n  const second = document.getElementById('name-second-' + idx).value.trim();\n  if (first.length < 3 || last.length < 3) return;\n\n  const dob = document.getElementById('name-dob-' + idx).value;\n  lastSearch = { tab: 'name', first, last, second, dob };\n  const full = [first, last, second].filter(Boolean).join(' ');\n\n  if (last.toLowerCase() === 'brown') {\n    document.getElementById('results-query').textContent = '\"' + full + '\"';\n    showScreen('results');\n  } else {\n    showNoResult('Customer name', full, 'name');\n  }\n}\n\n/* ============================================================\n   HAPPY-PATH MOCK CUSTOMER\n   Any search matching one of Marcus Brown's identifiers opens the\n   Customer Details screen. Everything else \u2192 no-customer-found.\n   ============================================================ */\nconst HAPPY_CUSTOMER = {\n  name: 'Marcus Brown',\n  trn:      { norm: '123456789',  display: '123-456-789' },\n  license:  { norm: '0123456',    display: '0123456' },     // NOTE: search validator wants 9 digits\n  passport: { norm: 'A1234567',   display: 'A1234567' },\n  nids:     { norm: '750123456',  display: '750123456' },    // ASSUMPTION: no NIDS value was supplied\n  cosacs:   { norm: 'GAFN200392', display: 'GAFN200392' },\n  phone:    '+1 876 555 0100'\n};\nfunction normId(v) { return (v || '').replace(/[^a-z0-9]/gi, '').toUpperCase(); }\n\n/* Write a customer's data into the Customer Details navy header, then open it.\n   Empty fields are left untouched so partial data doesn't blank the placeholder. */\nfunction openCustomerDetails(c) {\n  const root = document.getElementById('screen-register-success');\n  if (root && c) {\n    const set = (el, v) => { if (el && v) el.textContent = v; };\n    set(root.querySelector('.customer-name'), c.name);\n    const idVals = root.querySelectorAll('.id-block .id-value');\n    set(idVals[0], c.idNumber);\n    set(idVals[1], c.coscacs);\n    const typeVals = root.querySelectorAll('.type-block .type-value');\n    set(typeVals[1], c.phone);\n  }\n  showScreen('customer-details');\n}\n\n/* Shorthand: open Customer Details for the happy-path mock customer. */\nfunction openHappyCustomer() {\n  openCustomerDetails({\n    name: HAPPY_CUSTOMER.name,\n    idNumber: HAPPY_CUSTOMER.trn.display,\n    coscacs: HAPPY_CUSTOMER.cosacs.display,\n    phone: HAPPY_CUSTOMER.phone\n  });\n}\n\n/* Open Customer Details from a matches-list row (reads that row's own cells). */\nfunction openCustomerFromRow(row) {\n  const cells = row.querySelectorAll('.cell-meta');\n  openCustomerDetails({\n    name:     row.querySelector('.cell-name').textContent.trim(),\n    idNumber: cells[1] ? cells[1].textContent.trim() : '',\n    coscacs:  cells[2] ? cells[2].textContent.trim() : '',\n    phone:    ''\n  });\n}\n\n/* Run a Document search (TRN / Passport / Driver's licence / NIDS).\n   Marcus Brown's matching identifier \u2192 Customer Details; else no result. */\nfunction runDocSearch(idx) {\n  const sel   = document.getElementById('doc-type-'   + idx);\n  const input = document.getElementById('doc-number-' + idx);\n  const fmt   = docFormats[sel.value] || docFormats.trn;\n  if (!fmt.validate(input.value)) return;\n\n  const label = docLabels[sel.value] || 'TRN';\n  lastSearch = { tab: 'document', docType: sel.value, docValue: input.value };\n\n  const hc = HAPPY_CUSTOMER[sel.value];\n  if (hc && normId(input.value) === hc.norm) { openHappyCustomer(); return; }\n  showNoResult(label, input.value, label);\n}\n\n/* Run a COSACS ID search.\n   Marcus Brown's COSACS ID \u2192 Customer Details; else no result. */\nfunction runCosacsSearch(idx) {\n  const input = document.getElementById('cosacs-id-' + idx);\n  if (!/^[A-Za-z]{4}\\d{6}$/.test(input.value.replace(/\\s/g, ''))) return;\n\n  lastSearch = { tab: 'cosacs', cosacs: input.value };\n\n  if (normId(input.value) === HAPPY_CUSTOMER.cosacs.norm) { openHappyCustomer(); return; }\n  showNoResult('Coscacs ID', input.value, 'Coscacs ID');\n}\n\n/* Screen switching */\nfunction showScreen(name) {\n  /* 'customer-details' is an alias for the imported details screen. */\n  if (name === 'customer-details') name = 'register-success';\n  if (name === 'new-hp-purchase' || name === 'simulation') {\n    try { window.parent.postMessage({ __unicredit: true, action: 'open-hp' }, '*'); } catch (e) {}\n    return;\n  }\n  const target = document.getElementById('screen-' + name);\n  /* Destinations that are out of scope this round (e.g. 'details') are\n     no-ops \u2014 the placeholder click is intentionally inert for now. */\n  if (!target) return;\n  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));\n  target.classList.add('active');\n  /* Entering the registration form: pre-fill from the last search, or clear it\n     for a fresh start (onboarding link). Defaults to clear for direct calls. */\n  if (name === 'register-customer') {\n    try { pendingRegisterPrefill ? prefillRegistration() : clearRegistration(); } catch (e) {}\n    pendingRegisterPrefill = false;\n  }\n  /* Entering the results list: pre-fill the refine bar from the original search\n     and reset any prior row filtering so every match is shown. */\n  if (name === 'results') { try { populateRefine(); } catch (e) {} }\n  window.scrollTo(0, 0);\n}\n\n/* ============================================================\n   REGISTRATION BRIDGE\n   Carries the searched value into the Create-new-customer form,\n   and the registered name/phone into the success/details screen.\n   ============================================================ */\n\n/* Search doc-type values \u2192 registration select keys (no TRN field exists). */\nconst REG_DOC_MAP = { passport: 'passport', license: 'licence', nids: 'nids' };\n\n/* Open the registration form. prefill=true carries the last search into the\n   form; prefill=false clears it for a fresh start (e.g. the onboarding link). */\nlet pendingRegisterPrefill = false;\nfunction openRegister(prefill) {\n  pendingRegisterPrefill = !!prefill;\n  showScreen('register-customer');\n}\n\n/* Reset the registration form to a pristine state (best-effort: clears every\n   field and the document-type select, dispatching events so form.js updates). */\nfunction clearRegistration() {\n  const clear = (id) => {\n    const el = document.getElementById(id);\n    if (el) { el.value = ''; el.dispatchEvent(new Event('input', { bubbles: true })); }\n  };\n  ['firstname-control', 'secondname-control', 'lastname-control',\n   'secondlastname-control', 'email-control', 'phone-control'].forEach(clear);\n  const dob = document.getElementById('dob-control');\n  if (dob) { dob.value = ''; dob.classList.remove('has-date'); dob.dispatchEvent(new Event('change', { bubbles: true })); }\n  /* Document-type select + number */\n  const selOpt = document.querySelector('#doctype-menu .select-option.selected');\n  if (selOpt) selOpt.classList.remove('selected');\n  const dv = document.getElementById('doctype-value'); if (dv) dv.textContent = '';\n  const fdt = document.getElementById('field-doctype'); if (fdt) fdt.classList.remove('has-value', 'is-open');\n  const dn = document.getElementById('docnumber-control'); if (dn) { dn.value = ''; dn.disabled = true; }\n  const dh = document.getElementById('docnumber-hint'); if (dh) dh.textContent = 'Select a document type first';\n  const fdn = document.getElementById('field-docnumber'); if (fdn) fdn.classList.remove('has-value');\n}\n\nfunction prefillRegistration() {\n  const s = lastSearch;\n  if (!s) return;\n  const setVal = (id, val) => {\n    const el = document.getElementById(id);\n    if (!el) return;\n    el.value = val;\n    el.dispatchEvent(new Event('input', { bubbles: true }));\n  };\n  if (s.tab === 'name') {\n    /* Search captures first / last / second-last \u2192 map to the form's fields. */\n    setVal('firstname-control', s.first || '');\n    setVal('lastname-control', s.last || '');\n    setVal('secondlastname-control', s.second || '');\n  } else if (s.tab === 'document') {\n    const key = REG_DOC_MAP[s.docType];\n    if (key) {\n      /* Click the matching custom-select option so form.js enables the number field. */\n      const opt = document.querySelector('#doctype-menu .select-option[data-value=\"' + key + '\"]');\n      if (opt) opt.click();\n      setVal('docnumber-control', (s.docValue || '').replace(/\\s/g, ''));\n    }\n    /* TRN searches have no equivalent field in the registration form \u2014 left blank. */\n  }\n  /* COSACS ID searches have no equivalent registration field \u2014 left blank. */\n}\n\n/* Populate the success / customer-details banner with the just-registered name. */\nfunction onRegistrationComplete(data) {\n  if (!data) return;\n  const nameEl = document.querySelector('#screen-register-success .customer-name');\n  if (nameEl && data.name) nameEl.textContent = data.name;\n}\nwindow.onRegistrationComplete = onRegistrationComplete;\n\n/* Return to the search screen from the results view.\n   preserve = true  \u2192 keep the previous query (Edit / Refine / Back to search)\n   preserve = false \u2192 clear all fields for a fresh query (Start new search) */\nfunction goToSearch(preserve) {\n  const screenName = preserve ? 'data' : 'empty';\n  showScreen(screenName);\n  const card = document.querySelector('#screen-' + screenName + ' .search-card');\n  if (!card) return;\n\n  if (preserve) {\n    /* Restore whichever tab + fields produced the last search */\n    const s = lastSearch || { tab: 'name', first: '', last: '', second: '' };\n    if (s.tab === 'name') {\n      switchTab(card.querySelector('.tab[data-tab=\"name\"]'));\n      document.getElementById('name-first-2').value  = s.first  || '';\n      document.getElementById('name-last-2').value   = s.last   || '';\n      document.getElementById('name-second-2').value = s.second || '';\n      document.getElementById('name-dob-2').value    = '';\n      validateName(2);\n      document.getElementById('name-last-2').focus();\n    } else if (s.tab === 'document') {\n      switchTab(card.querySelector('.tab[data-tab=\"document\"]'));\n      document.getElementById('doc-type-2').value = s.docType;\n      onDocTypeChange(2);                                  /* clears the field */\n      document.getElementById('doc-number-2').value = s.docValue || '';\n      validateDoc(2);\n      document.getElementById('doc-number-2').focus();\n    } else if (s.tab === 'cosacs') {\n      switchTab(card.querySelector('.tab[data-tab=\"cosacs\"]'));\n      document.getElementById('cosacs-id-2').value = s.cosacs || '';\n      validateCosacs(2);\n      document.getElementById('cosacs-id-2').focus();\n    }\n  } else {\n    /* Fresh start: clear every field and reset to the default Name tab */\n    switchTab(card.querySelector('.tab[data-tab=\"name\"]'));\n    ['name-first-1', 'name-last-1', 'name-second-1', 'name-dob-1', 'doc-number-1', 'cosacs-id-1']\n      .forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });\n    document.getElementById('doc-type-1').value = 'trn';\n    onDocTypeChange(1);\n    validateName(1);\n    validateCosacs(1);\n  }\n}\n\n/* Pristine snapshot of the refine bar (captured on entry) \u2014 drives the\n   enable/disable state of the \"Refine results\" button. */\nlet refineInitial = null;\n\n/* ============================================================\n   REFINE RESULTS  (Search-results screen only)\n   - Pre-fills First / Last / DOB from the original search.\n   - Phone starts empty; phone uses the Jamaican format.\n   - Filtering runs ONLY on \"Refine results\" click (not live).\n   ============================================================ */\nfunction populateRefine() {\n  const s = lastSearch || {};\n  const set = (id, v) => { const el = document.getElementById(id); if (el) el.value = v || ''; };\n  set('refine-first', s.first);\n  set('refine-last',  s.last);\n  set('refine-dob',   s.dob);\n  set('refine-phone', '');\n  /* Snapshot the pristine (pre-filled) state so the button stays disabled\n     until the CSR changes any value or adds a phone number. */\n  refineInitial = { first: s.first || '', last: s.last || '', dob: s.dob || '', phone: '' };\n  updateRefineButton();\n  /* Clear any filtering left over from a previous refine, so every match shows. */\n  document.querySelectorAll('#screen-results .results-row').forEach(r => { r.style.display = ''; });\n}\n\n/* Enable \"Refine results\" only once the CSR has changed something from the\n   pristine pre-filled state (or typed into the empty Phone field). */\nfunction updateRefineButton() {\n  const btn = document.getElementById('refine-search-btn');\n  if (!btn) return;\n  const gv = id => (document.getElementById(id) || {}).value || '';\n  const init = refineInitial || { first: '', last: '', dob: '', phone: '' };\n  const changed =\n    gv('refine-first') !== init.first ||\n    gv('refine-last')  !== init.last  ||\n    gv('refine-dob')   !== init.dob   ||\n    gv('refine-phone') !== init.phone;\n  btn.disabled = !changed;\n  btn.classList.toggle('disabled', !changed);\n}\n\n/* Jamaican phone mask: ###-###-#### as the user types. */\nfunction formatRefinePhone() {\n  const el = document.getElementById('refine-phone');\n  if (!el) return;\n  const d = el.value.replace(/\\D/g, '').slice(0, 10);\n  let out = d;\n  if (d.length > 6)      out = d.slice(0, 3) + '-' + d.slice(3, 6) + '-' + d.slice(6);\n  else if (d.length > 3) out = d.slice(0, 3) + '-' + d.slice(3);\n  el.value = out;\n}\n\n/* Filter the results rows against whatever the CSR entered.\n   Empty fields don't narrow. */\nfunction refineResults() {\n  const get = id => (document.getElementById(id) || {}).value || '';\n  const first = get('refine-first').trim().toLowerCase();\n  const last  = get('refine-last').trim().toLowerCase();\n  const dobRaw = get('refine-dob');                       /* yyyy-mm-dd */\n  const phone = get('refine-phone').replace(/\\D/g, '');\n\n  let dobFmt = '';\n  if (dobRaw) {\n    const p = dobRaw.split('-');                           /* [yyyy, mm, dd] */\n    if (p.length === 3) dobFmt = (p[2] + p[1] + p[0]);     /* ddmmyyyy, digits only */\n  }\n\n  document.querySelectorAll('#screen-results .results-row').forEach(row => {\n    const name  = (row.querySelector('.cell-name') || {}).textContent || '';\n    const cells = row.querySelectorAll('.cell-meta');\n    const rowDob   = (cells[3] ? cells[3].textContent : '').replace(/\\D/g, ''); /* ddmmyyyy */\n    const rowPhone = (cells[4] ? cells[4].textContent : '').replace(/\\D/g, '');\n    const nameLc = name.toLowerCase();\n\n    let ok = true;\n    if (first && nameLc.indexOf(first) === -1) ok = false;\n    if (last  && nameLc.indexOf(last)  === -1) ok = false;\n    if (dobFmt && rowDob !== dobFmt) ok = false;\n    if (phone && rowPhone.indexOf(phone) === -1) ok = false;\n\n    row.style.display = ok ? '' : 'none';\n  });\n}\n<\/script>\n\n\n<!-- Imported: customer-registration form behaviour -->\n<script>\n/* ============================================================\n   Customer registration \u2014 interactive behaviour\n   - Custom document-type select\n   - Dynamic document-number mask (per document type)\n   - Phone mask  +1 (876) ###-####\n   - Native date picker (browser default)\n   - CTA enable/disable (no inline error messages yet)\n   ============================================================ */\n(function () {\n  'use strict';\n\n  /* ---------- Document type config ---------- */\n  var DOC_TYPES = {\n    trn:      { label: 'TRN number',        placeholder: 'e.g. 098-765-432', hint: 'Format: 9 digits with hyphens' },\n    voters:   { label: 'Voters ID',         placeholder: 'e.g. 1234567',     hint: 'Format: 7 digits, no spaces' },\n    licence:  { label: \"Driver's licence\", hint: '9 digits \u2014 e.g. 1234567 89' },\n    passport: { label: 'Passport',         hint: '1 letter + 7 digits \u2014 e.g. A1234567' },\n    nids:     { label: 'NIDS',             hint: '9 digits \u2014 e.g. 123456789' }\n  };\n\n  var state = {\n    docType: '',\n    docNumber: '',\n    firstName: '',\n    secondName: '',\n    lastName: '',\n    secondLastName: '',\n    dob: '',\n    phone: '',\n    email: ''\n  };\n\n  /* ---------- Helpers ---------- */\n  function $(sel, ctx) { return (ctx || document).querySelector(sel); }\n  function setHasValue(fieldEl, on) { fieldEl.classList.toggle('has-value', !!on); }\n\n  /* ============================================================\n     CUSTOM SELECT \u2014 Document type\n     ============================================================ */\n  var selectField   = $('#field-doctype');\n  var selectControl = $('#doctype-control');\n  var selectValue   = $('#doctype-value');\n  var selectMenu    = $('#doctype-menu');\n\n  function closeSelect() { selectField.classList.remove('is-open'); }\n\n  selectControl.addEventListener('click', function (e) {\n    e.stopPropagation();\n    selectField.classList.toggle('is-open');\n  });\n\n  selectMenu.querySelectorAll('.select-option').forEach(function (opt) {\n    opt.addEventListener('click', function () {\n      var key = opt.getAttribute('data-value');\n      state.docType = key;\n      selectValue.textContent = DOC_TYPES[key].label;\n      setHasValue(selectField, true);\n\n      selectMenu.querySelectorAll('.select-option').forEach(function (o) {\n        o.classList.toggle('selected', o === opt);\n      });\n      closeSelect();\n\n      // Reset & enable the document-number field for the chosen type\n      resetDocNumber();\n      validate();\n    });\n  });\n\n  document.addEventListener('click', function (e) {\n    if (!selectField.contains(e.target)) closeSelect();\n  });\n\n  /* ============================================================\n     DOCUMENT NUMBER \u2014 dynamic mask\n     ============================================================ */\n  var docField   = $('#field-docnumber');\n  var docInput    = $('#docnumber-control');\n  var docHint     = $('#docnumber-hint');\n\n  function resetDocNumber() {\n    docInput.value = '';\n    state.docNumber = '';\n    setHasValue(docField, false);\n    docInput.disabled = false;\n    docInput.removeAttribute('inputmode');\n    if (state.docType === 'passport') {\n      docInput.setAttribute('inputmode', 'text');\n    } else {\n      docInput.setAttribute('inputmode', 'numeric');\n    }\n    docInput.placeholder = DOC_TYPES[state.docType].placeholder || ' ';\n    docHint.textContent = DOC_TYPES[state.docType].hint;\n  }\n\n  function formatDocNumber(raw, type) {\n    if (type === 'trn') {\n      var t = raw.replace(/\\D/g, '').slice(0, 9);\n      var groups = [];\n      for (var j = 0; j < t.length; j += 3) groups.push(t.slice(j, j + 3));\n      return groups.join('-');\n    }\n    if (type === 'voters') {\n      return raw.replace(/\\D/g, '').slice(0, 7);\n    }\n    if (type === 'passport') {\n      var clean = raw.replace(/[^a-zA-Z0-9]/g, '').toUpperCase();\n      var out = '';\n      for (var i = 0; i < clean.length; i++) {\n        var ch = clean[i];\n        if (out.length === 0) { if (/[A-Z]/.test(ch)) out += ch; }\n        else if (/[0-9]/.test(ch) && out.length < 8) { out += ch; }\n      }\n      return out;\n    }\n    if (type === 'licence') {\n      var d = raw.replace(/\\D/g, '').slice(0, 9);\n      return d.length > 7 ? d.slice(0, 7) + ' ' + d.slice(7) : d;\n    }\n    // nids\n    return raw.replace(/\\D/g, '').slice(0, 9);\n  }\n\n  function docNumberValid() {\n    var v = state.docNumber;\n    if (state.docType === 'trn')      return v.replace(/\\D/g, '').length === 9;\n    if (state.docType === 'voters')   return v.replace(/\\D/g, '').length === 7;\n    if (state.docType === 'passport') return /^[A-Z]\\d{7}$/.test(v);\n    if (state.docType === 'licence')  return v.replace(/\\s/g, '').length === 9;\n    if (state.docType === 'nids')     return v.replace(/\\s/g, '').length === 9;\n    return false;\n  }\n\n  docInput.addEventListener('input', function () {\n    if (!state.docType) { docInput.value = ''; return; }\n    var formatted = formatDocNumber(docInput.value, state.docType);\n    docInput.value = formatted;\n    state.docNumber = formatted;\n    setHasValue(docField, formatted.length > 0);\n    validate();\n  });\n\n  /* ============================================================\n     PHONE \u2014 +1 (876) ###-####\n     ============================================================ */\n  var phoneField = $('#field-phone');\n  var phoneInput = $('#phone-control');\n\n  phoneInput.addEventListener('input', function () {\n    var d = phoneInput.value.replace(/\\D/g, '').slice(0, 7);\n    var f = d.length > 3 ? d.slice(0, 3) + '-' + d.slice(3) : d;\n    phoneInput.value = f;\n    state.phone = d;\n    setHasValue(phoneField, d.length > 0);\n    validate();\n  });\n\n  function phoneValid() { return state.phone.length === 7; }\n\n  /* ============================================================\n     DATE OF BIRTH \u2014 native picker\n     ============================================================ */\n  var dateField = $('#field-dob');\n  var dateInput = $('#dob-control');\n  var dateIcon  = $('#dob-icon');\n\n  // label stays floated (native control shows its own placeholder)\n  setHasValue(dateField, true);\n\n  dateInput.addEventListener('change', function () {\n    state.dob = dateInput.value;\n    dateInput.classList.toggle('has-date', !!dateInput.value);\n    validate();\n  });\n  dateIcon.addEventListener('click', function () {\n    if (typeof dateInput.showPicker === 'function') { try { dateInput.showPicker(); } catch (e) {} }\n    else { dateInput.focus(); }\n  });\n\n  /* ============================================================\n     TEXT FIELDS (names + email)\n     ============================================================ */\n  function bindText(id, key) {\n    var el = $('#' + id);\n    el.addEventListener('input', function () {\n      state[key] = el.value.trim();\n      validate();\n    });\n  }\n  bindText('firstname-control', 'firstName');\n  bindText('secondname-control', 'secondName');\n  bindText('lastname-control', 'lastName');\n  bindText('secondlastname-control', 'secondLastName');\n\n  var emailInput = $('#email-control');\n  emailInput.addEventListener('input', function () {\n    state.email = emailInput.value.trim();\n    validate();\n  });\n\n  function emailValid() {\n    var v = state.email;\n    var at = v.indexOf('@');\n    return at > 0 && v.toLowerCase().indexOf('.com') > at + 1;\n  }\n\n  /* ============================================================\n     CTA enable / disable\n     ============================================================ */\n  var cta = $('#cta-continue');\n\n  function formValid() {\n    return (\n      !!state.docType &&\n      docNumberValid() &&\n      state.firstName.length >= 3 &&\n      state.lastName.length >= 3 &&\n      !!state.dob &&\n      phoneValid() &&\n      emailValid()\n    );\n  }\n\n  function validate() {\n    cta.disabled = !formValid();\n  }\n\n  $('#registration-form').addEventListener('submit', function (e) {\n    e.preventDefault();\n    if (!formValid()) return;\n    // Registration complete \u2192 continue to the success / customer-details screen.\n    var full = [state.firstName, state.secondName, state.lastName, state.secondLastName].filter(Boolean).join(' ');\n    if (window.onRegistrationComplete) window.onRegistrationComplete({ name: full, phone: state.phone });\n    if (window.showScreen) window.showScreen('register-success');\n  });\n\n  validate();\n})();\n\n<\/script>\n<!-- Imported: customer-registration duplicate-detection scenarios -->\n<script>\n/* ============================================================\n   Customer registration \u2014 SCENARIO ENGINE  (pop-up responses)\n   ------------------------------------------------------------\n   This layer sits ON TOP of the existing form. It never changes\n   the form's markup or behaviour \u2014 it only reads the live field\n   values and, when a scenario matches, shows a pop-up.\n\n   Each scenario is identified by the pair the CSR enters:\n        DOCUMENT TYPE  +  DOCUMENT NUMBER\n   The check runs only when the CSR clicks \"Continue\" (the form\n   keeps that button disabled until every field is complete).\n\n   HOW TO ADD A NEW SCENARIO:\n     1. Add the existing customer it points to in RECORDS.\n     2. Add an entry to SCENARIOS keyed by { docType, docNumber }\n        whose build() returns a result object.\n   ============================================================ */\n(function () {\n  'use strict';\n\n  /* ---------- 1. Existing customers (\"database\") ---------- */\n  var RECORDS = {\n    rosa: {\n      fullName: 'Rosa Andrew Williams',\n      customerId: 'UC-1004732',\n      cosacs: 'RAWL150873',\n      docTypeLabel: \"Driver's licence\",\n      docNumberFmt: '9290000 01',\n      dob: '14 Mar 1979',\n      phone: '+1 (876) 412-8890',\n      email: 'rosa.williams@mail.com',\n      status: 'Active customer',\n      since: 'March 2020'\n    },\n    jada: {\n      fullName: 'Jada Campbell',\n      customerId: 'UC-1006218',\n      cosacs: 'JCAM221904',\n      docTypeLabel: \"Driver's licence\",\n      docNumberFmt: '9290000 02',\n      dob: '20 Dec 1990',\n      phone: '+1 (876) 555-2014',\n      email: 'jada.campbell@mail.com',\n      status: 'Active customer',\n      since: 'January 2018'\n    },\n    jadeSmith: {\n      fullName: 'Jade Campbell Smith',\n      customerId: 'UC-1009347',\n      cosacs: 'JCSM093471',\n      docTypeLabel: \"Driver's licence\",\n      docNumberFmt: '9290000 07',\n      dob: '20 Dec 1990',\n      phone: '+1 (876) 555-7781',\n      email: 'jade.smith@mail.com',\n      status: 'Active customer',\n      since: 'September 2016'\n    },\n    jadaWright: {\n      fullName: 'Jada Campbell Wright',\n      customerId: 'UC-1011285',\n      cosacs: 'JCWR112850',\n      docTypeLabel: \"Driver's licence\",\n      docNumberFmt: '9290000 13',\n      dob: '20 Dec 1990',\n      phone: '+1 (876) 555-3390',\n      email: 'jada.wright@mail.com',\n      status: 'Active customer',\n      since: 'May 2021'\n    }\n  };\n\n  /* ---------- 2. Icons (Lucide style \u2014 2px stroke, round caps) ---------- */\n  var ICONS = {\n    back: '<svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"15 18 9 12 15 6\"></polyline></svg>',\n    arrow: '<svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"5\" y1=\"12\" x2=\"19\" y2=\"12\"></line><polyline points=\"12 5 19 12 12 19\"></polyline></svg>',\n    plus: '<svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"12\" y1=\"5\" x2=\"12\" y2=\"19\"></line><line x1=\"5\" y1=\"12\" x2=\"19\" y2=\"12\"></line></svg>',\n    check: '<svg width=\"28\" height=\"28\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"20 6 9 17 4 12\"></polyline></svg>'\n  };\n\n  /* ---------- 3. Read the live form ---------- */\n  var DOC_LABELS = { licence: \"Driver's licence\", passport: 'Passport', nids: 'NIDS' };\n\n  function readForm() {\n    var sel = document.querySelector('#doctype-menu .select-option.selected');\n    var docTypeKey = sel ? sel.getAttribute('data-value') : '';\n    var rawNum = (document.querySelector('#docnumber-control') || {}).value || '';\n    var number = rawNum.replace(/[^a-zA-Z0-9]/g, '').toUpperCase();\n    function val(id) { var e = document.getElementById(id); return e ? e.value.trim() : ''; }\n    return {\n      docTypeKey: docTypeKey,\n      docTypeLabel: DOC_LABELS[docTypeKey] || '',\n      number: number,\n      firstName: val('firstname-control'),\n      secondName: val('secondname-control'),\n      lastName: val('lastname-control'),\n      secondLastName: val('secondlastname-control'),\n      dob: val('dob-control'),\n      phone: val('phone-control'),\n      email: val('email-control')\n    };\n  }\n\n  function keyOf(form) { return form.docTypeKey + ':' + form.number; }\n\n  /* ---------- 4. Scenario registry (keyed by document type + number) ---------- */\n  var SCENARIOS = [\n\n    /* ===== Scenario 1 \u00b7 Identical document (blocking) ===== */\n    {\n      docType: 'licence', docNumber: '929000001',\n      build: function () {\n        var p = RECORDS.rosa;\n        return {\n          title: 'This customer already exists',\n          body: 'This <strong>' + p.docTypeLabel.toLowerCase() +\n                '</strong> is already registered to <strong>' + p.fullName +\n                '</strong>. You can\\u2019t create a new customer with this document.',\n          record: p,\n          actions: [\n            { label: 'Cancel', variant: 'secondary', act: 'close' },\n            { label: 'Open profile', variant: 'primary', act: 'profile', icon: ICONS.arrow }\n          ]\n        };\n      }\n    },\n\n    /* ===== Scenario 2 \u00b7 Possible match (same name + DOB, different doc) ===== */\n    {\n      docType: 'passport', docNumber: 'A1234567',\n      build: function (form) {\n        var p = RECORDS.jada;\n        return {\n          title: 'Possible match',\n          body: 'A customer with the same name and date of birth already exists, ' +\n                'registered with a different document.',\n          record: p,\n          compare: {\n            entered: {\n              heading: 'Entered now',\n              name: fullNameOf(form) || p.fullName,\n              lines: [\n                { label: 'Document type', value: form.docTypeLabel || 'Passport' },\n                { label: 'Document number', value: form.number || 'A1234567' }\n              ]\n            },\n            found: {\n              heading: 'On file',\n              name: p.fullName,\n              lines: customerLines(p)\n            }\n          },\n          afterRecord: {\n            text: 'Same details but a different individual?',\n            link: { label: \"Create new customer\", act: 'proceed' }\n          },\n          actions: [\n            { label: 'Cancel', variant: 'secondary', act: 'close' },\n            { label: 'Add passport to customer', variant: 'primary', act: 'addDoc' }\n          ],\n          added: {\n            title: 'Passport added',\n            body: 'The passport <strong>A1234567</strong> has been linked to <strong>' +\n                  p.fullName + '</strong>\\u2019s profile.'\n          }\n        };\n      }\n    },\n\n    /* ===== Scenario 3 \u00b7 Possible typo (same name + DOB + doc type, different number) ===== */\n    {\n      docType: 'licence', docNumber: '929000003',\n      build: function (form) {\n        var p = RECORDS.jada;\n        /* Doc-type phrase with its article, driven by what the CSR was entering. */\n        var DOC_PHRASES = {\n          trn:      'a TRN',\n          licence:  'a driver\\u2019s licence',\n          passport: 'a Passport',\n          nids:     'an NIDS'\n        };\n        var docPhrase = DOC_PHRASES[form.docTypeKey] || DOC_PHRASES.licence;\n        return {\n          title: 'Possible typo',\n          body: 'Another customer with the same name and date of birth already has ' +\n                '<strong>' + docPhrase + '</strong> on file with a slightly different number. ' +\n                'Please verify the number with the customer before continuing.',\n          record: p,\n          compare: {\n            entered: {\n              heading: 'Entered now',\n              name: fullNameOf(form) || p.fullName,\n              lines: [\n                { label: 'Document type', value: form.docTypeLabel || \"Driver's licence\" },\n                { label: 'Document number', value: form.number || '929000003' }\n              ]\n            },\n            found: {\n              heading: 'On file',\n              name: p.fullName,\n              lines: customerLines(p)\n            }\n          },\n          afterRecord: {\n            text: 'Same details but a different individual?',\n            link: { label: 'Create new customer', act: 'proceed' }\n          },\n          actions: [\n            { label: 'Cancel', variant: 'secondary', act: 'close' },\n            { label: 'Open existing customer', variant: 'primary', act: 'profile' }\n          ]\n        };\n      }\n    },\n\n    /* ===== Scenario 4 \u00b7 Similar matches (similar name + same DOB, new document) ===== */\n    {\n      docType: 'licence', docNumber: '929000004',\n      build: function () {\n        return {\n          title: 'Similar matches',\n          body: 'No exact match for this document, but these customers share the ' +\n                'same date of birth and a very similar name. Review before continuing.',\n          matches: [RECORDS.jadeSmith, RECORDS.jada, RECORDS.jadaWright],\n          afterRecord: {\n            text: 'Same details but a different individual?',\n            link: { label: 'Create new customer', act: 'proceed' }\n          },\n          actions: [\n            { label: 'Cancel', variant: 'secondary', act: 'close' },\n            { label: 'Open selected customer', variant: 'primary', act: 'openSelected' }\n          ]\n        };\n      }\n    }\n\n    /* (More scenarios are added here, keyed by document type + number) */\n  ];\n\n  function evaluate(form) {\n    if (!form.docTypeKey || !form.number) return null;\n    var s = SCENARIOS.find(function (x) {\n      return x.docType === form.docTypeKey && x.docNumber === form.number;\n    });\n    return s ? s.build(form) : null;\n  }\n\n  /* ---------- 5. Modal rendering ---------- */\n  var overlay = null;\n  var proceeded = {}; // keys the CSR chose to create as a new customer anyway\n  var selectedIdx = 0; // selected row in a \"Similar matches\" list\n\n  function initials(name) {\n    var parts = name.trim().split(/\\s+/);\n    var a = parts[0] ? parts[0][0] : '';\n    var b = parts.length > 1 ? parts[parts.length - 1][0] : '';\n    return (a + b).toUpperCase();\n  }\n\n  function fullNameOf(form) {\n    return [form.firstName, form.secondName, form.lastName, form.secondLastName]\n      .filter(Boolean).join(' ');\n  }\n\n  function closeModal() {\n    if (!overlay) return;\n    overlay.classList.remove('is-open');\n    var node = overlay;\n    setTimeout(function () { if (node && node.parentNode) node.parentNode.removeChild(node); }, 200);\n    overlay = null;\n    document.removeEventListener('keydown', onKey);\n  }\n\n  function onKey(e) { if (e.key === 'Escape') closeModal(); }\n\n  function buildButtons(actions) {\n    return actions.map(function (a) {\n      return '<button type=\"button\" class=\"pop-btn pop-btn-' + a.variant +\n        '\" data-act=\"' + a.act + '\">' + a.label + (a.icon || '') + '</button>';\n    }).join('');\n  }\n\n  /* Build the document-number field label from the customer's document type,\n     e.g. \"TRN number\", \"Driver's licence number\", \"Passport number\",\n     \"NIDS number\", \"Voters ID number\". Falls back to \"Doc number\". */\n  function docNumberLabel(p) {\n    var t = (p.docTypeLabel || '').toLowerCase();\n    if (t.indexOf('trn') !== -1)      return 'TRN number';\n    if (t.indexOf('licen') !== -1)    return \"Driver's licence number\";\n    if (t.indexOf('passport') !== -1) return 'Passport number';\n    if (t.indexOf('nids') !== -1)     return 'NIDS number';\n    if (t.indexOf('voter') !== -1)    return 'Voters ID number';\n    return 'Doc number';\n  }\n\n  /* Ordered fields shown for a matched customer:\n     Name (rendered separately) -> Cosacs ID -> DOB -> Customer since -> Doc number (if applicable) */\n  function customerLines(p) {\n    var lines = [\n      { label: 'Cosacs ID', value: p.cosacs },\n      { label: 'DOB', value: p.dob },\n      { label: 'Customer since', value: p.since }\n    ];\n    if (p.docNumberFmt) lines.push({ label: docNumberLabel(p), value: p.docNumberFmt });\n    return lines;\n  }\n\n  /* Render one field as \"<strong>Label:</strong> value\". Plain strings pass through unchanged. */\n  function formatLine(l) {\n    return (l && typeof l === 'object')\n      ? '<strong class=\"pop-field-label\">' + l.label + ':</strong> ' + l.value\n
