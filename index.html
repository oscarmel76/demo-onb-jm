<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unicredit · Plataforma de crédito (demo)</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: #171C8F; overflow: hidden; }
    .stage { position: fixed; inset: 0; }
    .frame {
      position: absolute; inset: 0; width: 100%; height: 100%;
      border: 0; opacity: 0; pointer-events: none;
      transition: opacity 0.22s ease;
    }
    .frame.active { opacity: 1; pointer-events: auto; }
    /* Initial splash while the search bundle unpacks */
    #boot {
      position: fixed; inset: 0; z-index: 50;
      background: #171C8F; display: flex; align-items: center; justify-content: center;
      transition: opacity 0.3s ease;
      font-family: Roboto, -apple-system, BlinkMacSystemFont, sans-serif;
    }
    #boot.hidden { opacity: 0; pointer-events: none; }
    #boot .dot {
      width: 54px; height: 54px; border-radius: 50%;
      border: 5px solid rgba(38,208,124,0.25); border-top-color: #26D07C;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="stage">
    <iframe id="search" class="frame active" title="Customer search"></iframe>
    <iframe id="hp"     class="frame"        title="Financing simulation"></iframe>
  </div>

  <div id="boot"><div class="dot"></div></div>

  <script>
    var search = document.getElementById('search');
    var hp     = document.getElementById('hp');
    var boot   = document.getElementById('boot');

    // Cache-bust the iframes on every shell load so redeploys always show fresh.
    var V = Date.now();
    search.src = '01-customer-search.html?v=' + V;
    hp.src     = 'simulation.html?v=' + V;

    function show(which) {
      var on  = which === 'hp' ? hp : search;
      var off = which === 'hp' ? search : hp;
      // Bring the incoming frame in fully opaque and on top BEFORE removing the
      // outgoing one, so the two never cross-fade (which looked like a flash).
      on.style.zIndex = '2';
      off.style.zIndex = '1';
      on.style.transition = 'none';
      on.classList.add('active');
      void on.offsetWidth;
      on.style.transition = '';
      off.classList.remove('active');
    }

    window.addEventListener('message', function (e) {
      var d = e.data;
      if (!d || d.__unicredit !== true) return;
      if (d.action === 'open-hp') {
        if (d.mode === 'cash') {
          var cs = 'simulation.html?mode=cash' +
                   '&name=' + encodeURIComponent(d.name || '') +
                   '&rating=' + encodeURIComponent(d.rating || '') +
                   '&cosacs=' + encodeURIComponent(d.cosacs || '') +
                   '&income=' + encodeURIComponent(d.income || '') +
                   '&committed=' + encodeURIComponent(d.committed || '') +
                   '&dsr=' + encodeURIComponent(d.dsr || '') +
                   '&trn=' + encodeURIComponent(d.trn || '') +
                   '&trnOnFile=' + (d.trnOnFile ? '1' : '0') +
                   '&arrears=' + (d.arrears ? '1' : '0') +
                   '&id=' + encodeURIComponent(d.id || '') + '&v=' + V;
          if (hp.getAttribute('src') !== cs) hp.setAttribute('src', cs);
        } else if (d.fromCarts) {
          var nextSrc = 'simulation.html?amount=' + encodeURIComponent(d.amount) +
                        '&down=' + encodeURIComponent(d.down) +
                        '&cart=' + encodeURIComponent(d.acct || '') + '&fromCarts=1&v=' + V;
          if (hp.getAttribute('src') !== nextSrc) hp.setAttribute('src', nextSrc);
        } else if (hp.getAttribute('src').indexOf('mode=cash') >= 0 || hp.getAttribute('src').indexOf('fromCarts') >= 0) {
          hp.setAttribute('src', 'simulation.html?v=' + V);
        }
        show('hp');
      }
      else if (d.action === 'back') {
        show('search');
        if (d.reset) {
          try { search.contentWindow.postMessage({ __unicredit: true, action: 'reset-search' }, '*'); } catch (e) {}
        }
      }
      else if (d.action === 'back-to-carts') {
        show('search');
        try { search.contentWindow.postMessage({ __unicredit: true, action: 'goto-carts' }, '*'); } catch (e) {}
      }
      else if (d.action === 'goto-customer') {
        show('search');
        try { search.contentWindow.postMessage({ __unicredit: true, action: 'goto-customer' }, '*'); } catch (e) {}
      }
    });

    // Hide the splash once the first (search) iframe has loaded.
    search.addEventListener('load', function () {
      setTimeout(function () { boot.classList.add('hidden'); }, 350);
    });
    // Safety fallback in case the load event was missed.
    setTimeout(function () { boot.classList.add('hidden'); }, 4000);
  </script>
</body>
</html>
